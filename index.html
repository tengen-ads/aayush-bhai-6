<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>𝟗𝐗 𝐏𝐑𝐎𝐅𝐈𝐓 𝐁𝐘 𝐒𝐘𝐒𝐓𝐄𝐌 𝐁𝐇𝐀𝐈</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#000814;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow:hidden;
    }

    .main-box{
      width:100%;
      max-width:390px;
      background:linear-gradient(180deg,#07111f,#081423);
      border-radius:28px;
      padding:30px 22px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .top-image{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:20px;
      border:4px solid #1da1ff;
      box-shadow:0 0 25px rgba(0,153,255,0.6);
    }

    .title{
      font-size:34px;
      font-weight:800;
      color:#29a9ff;
      margin-bottom:10px;
      line-height:1.2;
    }

    .title span{
      color:#1f8fff;
    }

    .subtitle{
      color:#d8d8d8;
      font-size:18px;
      margin-bottom:30px;
    }

    .btn{
      width:100%;
      display:block;
      text-decoration:none;
      background:#ff1616;
      color:white;
      padding:20px 15px;
      border-radius:22px;
      font-size:20px;
      font-weight:700;
      margin-bottom:20px;
      box-shadow:0 0 25px rgba(255,0,0,0.6);
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.03);
      background:#ff2d2d;
    }

    @media(max-width:480px){

      .main-box{
        max-width:95%;
        padding:25px 18px;
      }

      .title{
        font-size:28px;
      }

      .subtitle{
        font-size:16px;
      }

      .btn{
        font-size:17px;
        padding:18px 12px;
      }

      .top-image{
        width:100px;
        height:100px;
      }

    }

  </style>
</head>

<body>

  <div class="main-box">

    <!-- PROFILE IMAGE -->
    <img 
      src="https://www.image2url.com/r2/default/images/1780625870804-c2536b72-9958-453d-9ec1-4810e1c2d471.jpg"
      class="top-image"
    >

    <!-- TITLE -->
    <div class="title">
      𝑺𝑼𝑹𝑬𝑺𝑯𝑶𝑻 𝑩𝒀 𝑹𝑨𝑫𝑯𝑬 🔥 <span></span>
    </div>

    <!-- SUBTITLE -->
    <div class="subtitle">
      Tap to join the Telegram channel
    </div>

    <!-- BUTTON 1 -->
    <a 
      href="https://t.me/+0I51ZTe2-EpmODdl"
      class="btn"
      onclick="trackTelegram()"
      target="_blank"
    >
      Start Earning Today
    </a>

    <!-- BUTTON 2 -->
    <a 
      href="https://t.me/+0I51ZTe2-EpmODdl"
      class="btn"
      onclick="trackTelegram()"
      target="_blank"
    >
      Start Earning Today
    </a>

  </div>

</body>
</html>
